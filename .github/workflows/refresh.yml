name: Refresh & publish iCal

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.19'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      # Persist the newsletter extraction cache across runs. Unique key always
      # saves a fresh entry; restore-keys pulls the most recent prior cache so
      # Groq only runs on new mail (and partial cold-start progress carries over).
      - name: Restore newsletter cache
        uses: actions/cache@v4
        with:
          path: priv/newsletter_cache.json
          key: newsletter-cache-${{ github.run_id }}
          restore-keys: newsletter-cache-

      - run: mix deps.get
      - run: MIX_ENV=prod mix tricities.refresh
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}

      - name: Stage site
        run: |
          mkdir -p _site
          cp priv/static/tricities-events.ics _site/tricities-events.ics
          cp priv/static/sources.json _site/sources.json
          cp .github/pages/index.html _site/index.html
          # Cloudflare Pages serves _headers/_redirects from the deploy root
          cp .github/pages/_headers _site/_headers
          # Pages advanced mode: _worker.js in the deploy root handles /feed filtering
          cp .github/pages/_worker.js _site/_worker.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=tricities-events --branch=main
