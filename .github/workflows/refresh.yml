name: Refresh & publish iCal

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.19'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: MIX_ENV=prod mix tricities.refresh

      - name: Stage site
        run: |
          mkdir -p _site
          cp priv/static/tricities-events.ics _site/tricities-events.ics
          cp .github/pages/index.html _site/index.html
          # Cloudflare Pages serves _headers/_redirects from the deploy root
          cp .github/pages/_headers _site/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=tricities-events --branch=main
